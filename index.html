                            type: 'heading',
                            content: 'Rules vs CLAUDE.md vs Skills'
                        },
                        {
                            type: 'text',
                            content: 'These three tools look similar at first glance. They all provide\ncontext to Claude. The difference is when and why they activate.'
                        },
                        {
                            type: 'list',
                            items: [
                                'Claude needs basic project context - Use CLAUDE.md. Activates every session, automatically.',
                            ]
                        },
                        {
                            type: 'list',
                            items: [
                                'Claude needs context specific to what you\'re working on right now - Use Rules. Activates when you touch files matching the pattern.',
                            ]
                        },
                        {
                            type: 'list',
                            items: [
                                'Claude needs to know how you do a type of task - Use Skills. Activates when the task type is recognized (or you invoke it).',
                            ]
                        },
                        {
                            type: 'text',
                            content: 'Here\'s a concrete way to think about it:'
                        },
                        {
                            type: 'list',
                            items: [
                                '\"We\'re a software consultancy that serves healthcare and retail clients\" - CLAUDE.md. Always true, always relevant.',
                            ]
                        },
                        {
                            type: 'list',
                            items: [
                                '\"Client ABC uses Azure and requires HIPAA compliance\" - Rule. Only relevant when working on ABC\'s files.',
                            ]
                        },
                        {
                            type: 'list',
                            items: [
                                '\"When writing proposals, use this structure and this tone\" - Skill. Only relevant when writing a proposal, regardless of which client.',
                            ]
                        },
                        {
                            type: 'text',
                            content: 'The overlap between these tools is intentional. There\'s no single\nright answer for every situation. But as a rule of thumb: if the context\ndepends on *which files* you\'re touching, it\'s a rule. If it depends\non *what kind of task* you\'re doing, it\'s a skill. If it\'s always\ntrue, it\'s CLAUDE.md.'
                        },
                        {
                            type: 'heading',
                            content: 'How Rules Interact With CLAUDE.md'
                        },
                        {
                            type: 'text',
                            content: 'Rules don\'t replace CLAUDE.md. They add to it.'
                        },
                        {
                            type: 'text',
                            content: 'When you\'re working in clients/abc/, Claude sees:'
                        },
                        {
                            type: 'text',
                            content: '1.  Your global \~/.claude/CLAUDE.md (your identity and universal\npreferences)'
                        },
                        {
                            type: 'text',
                            content: '2.  Your project ./CLAUDE.md (project-level context)'
                        },
                        {
                            type: 'text',
                            content: '3.  The client-abc.md rule (client-specific context)'
                        },
                        {
                            type: 'text',
                            content: 'All three load. The rule adds specificity on top of the broader\ncontext. Your CLAUDE.md says \"I\'m a consultant,\" the rule says\n\"right now I\'m working for HealthFirst and they need HIPAA\ncompliance.\"'
                        },
                        {
                            type: 'text',
                            content: 'This layered approach keeps each file focused. CLAUDE.md doesn\'t need\nto know about every client. Rules don\'t need to repeat your general\npreferences.'
                        },

                            type: 'heading',
                            content: 'Multiple Rules Can Match'
                        },

                            type: 'text',
                            content: 'If a file matches patterns in multiple rules, all matching rules load.\nThis can be useful:'

                        {
                            type: 'text',
                            content: '.claude/rules/healthcare.md → \\* clients/abc/\\*\\*/\\*'
                        },
                        {
                            type: 'text',
                            content: '.claude/rules/azure-stack.md → \\* \\*\\*/azure/\\*\\*/\\*'
                        },
                        {
                            type: 'text',
                            content: '\\* clients/abc/\\*\\*/\\*'
                        },
                        {
                            type: 'text',
                            content: 'Working in clients/abc/ loads both the healthcare context and the\nAzure stack context. This lets you compose rules - one for the client,\none for the technology - without duplicating information.'
                        },
                        {
                            type: 'text',
                            content: 'Just be mindful. More rules loading means more context consumed. If\nyour rules are getting complex, it might be a sign that some of that\ncontext belongs in CLAUDE.md or a skill instead.'
                        },
                        {
                            type: 'heading',
                            content: 'Tips'
                        },
                        {
                            type: 'text',
                            content: 'Keep rules concise. A rule should be a quick-reference card, not an\nencyclopedia. The essential facts that Claude needs to not make\nmistakes. Detailed documentation belongs in skills.'
                        },
                        {
                            type: 'text',
                            content: 'Name rules descriptively. client-abc.md is better than rule1.md.\nYou\'ll end up with several rules, and clarity in filenames saves\nconfusion later.'
                        },
                        {
                            type: 'text',
                            content: 'Test your patterns. After creating a rule, open a file that should\nmatch and ask Claude: \"What do you know about this client?\" If the\nrule loaded correctly, Claude will know. If not, check your glob\npatterns.'
                        },
                        {
                            type: 'text',
                            content: 'Update rules when things change. Client switched from Azure to AWS? A\n5-second edit to the rule file, and every future session reflects the\nchange. This is the power of centralized context.'
                        },
                        {
                            type: 'text',
                            content: 'Hooks \- Automated Interventions'
                        },
                        {
                            type: 'text',
                            content: 'Commands and rules are things you set up. They sit there, ready to be\ninvoked or triggered. Hooks are different. Hooks watch what\'s happening\nand step in automatically when something goes wrong.'
                        },
                        {
                            type: 'text',
                            content: 'Here\'s the pattern hooks solve: Claude keeps making the same mistake.\nNot once - repeatedly, across sessions. You catch it, correct it, move\non. Next session, same thing. You\'re the quality control system, and\nyou\'re running on manual.'
                        },
                        {
                            type: 'text',
                            content: 'Maybe Claude searches the web for \"2024\" or \"2025\" information\nwhen it\'s 2026. Maybe it forgets you have a writing skill and generates\ntext in its default voice. Maybe it runs a command that breaks your\nproject, and you had no save point to roll back to.'
                        },
                        {
                            type: 'text',
                            content: 'Each of these is an intervention you keep performing by hand. Hooks\nautomate that intervention.'
                        },
                        {
                            type: 'heading',
                            content: 'A Word of Honest Framing'
                        },
                        {
                            type: 'text',
                            content: 'Hooks are the most technical tool in this module. Commands are\nmarkdown files. Rules are markdown files with patterns. Hooks involve\nJSON configuration and sometimes small scripts.'
                        },
                        {
                            type: 'text',
                            content: 'If you\'re comfortable with commands and rules but hooks feel like a\nstretch, that\'s fine. Skip them for now and come back later. The value\nof commands and rules alone is significant. Hooks are a bonus for when\nyou\'re ready.'
                        },
                        {
                            type: 'text',
                            content: 'That said, the examples below are practical and copy-pasteable. You\ndon\'t need to understand every detail to use them.'
                        },

                {
                    id: 'lesson-2',
                    title: 'Hooks & Automation',
                    sections: [
                        {
                            type: 'heading',
                            content: 'How Hooks Work'
                        },
                        {
                            type: 'text',
                            content: 'Hooks are configured in your .claude/settings.json file\n(project-level) or \~/.claude/settings.json (global). They consist of\nthree parts:'
                        },
                        {
                            type: 'text',
                            content: '1.  Event - what triggers the hook'
                        },
                        {
                            type: 'text',
                            content: '2.  Matcher - an optional filter (which tool, which pattern)'
                        },
                        {
                            type: 'text',
                            content: '3.  Action - what happens when it triggers'
                        },
                        {
                            type: 'text',
                            content: 'Here are the events you can hook into:'
                        },
                        {
                            type: 'list',
                            items: [
                                'PreToolUse - Before Claude uses a tool (you can block or modify it)',
                            ]
                        },
                        {
                            type: 'list',
                            items: [
                                'PostToolUse - After Claude uses a tool (you can react to the result)',
                            ]
                        },
                        {
                            type: 'list',
                            items: [
                                'UserPromptSubmit - When you submit a prompt (you can inject additional context)',
                            ]
                        },
                        {
                            type: 'list',
                            items: [
                                'Stop - When Claude finishes responding',
                            ]
                        },
                        {
                            type: 'text',
                            content: 'The most useful ones for everyday work are PreToolUse (catch mistakes\nbefore they happen) and UserPromptSubmit (add context to your\nprompts).'
                        },
                        {
                            type: 'heading',
                            content: 'Example 1: Year Correction'
                        },
                        {
                            type: 'text',
                            content: 'The problem: Claude\'s training data has a cutoff. When it searches\nthe web, it sometimes searches for \"2024\" or \"2025\" information,\neven though it\'s 2026. You keep catching this and saying \"search for\n2026 instead.\"'
                        },
                        {
                            type: 'text',
                            content: 'The hook: Intercept web searches and check for outdated years. If\nfound, block the search and tell Claude to use the current year.'
                        },
                        {
                            type: 'text',
                            content: 'Add this to .claude/settings.json:'
                        },
                        {
                            type: 'text',
                            content: '{'
                        },
                        {
                            type: 'text',
                            content: '\"hooks\": {'
                        },
                        {
                            type: 'text',
                            content: '\"PreToolUse\": \\['
                        },
                        {
                            type: 'text',
                            content: '{'
                        },
                        {
                            type: 'text',
                            content: '\"matcher\": \"WebSearch\\|WebFetch\",'
                        },
                        {
                            type: 'text',
                            content: '\"hook\": {'
                        },
                        {
                            type: 'text',
                            content: '\"type\": \"command\",'
                        },
                        {
                            type: 'text',
                            content: '\"command\": \"python3 -c \\\\\"import sys, json;\ndata=json.load(sys.stdin);\nquery=str(data.get(\'input\',{}).get(\'query\',\'\')+data.get(\'input\',{}).get(\'url\',\'\'));\nexit(1) if any(y in query for y in \\[\'2024\',\'2025\'\\]) else\nexit(0)\\\\\"\"'
                        },
                        {
                            type: 'text',
                            content: '},'
                        },
                        {
                            type: 'text',
                            content: '\"message\": \"It\'s 2026. Update the search to use the current\nyear.\"'
                        },
                        {
                            type: 'text',
                            content: '}'
                        },
                        {
                            type: 'text',
                            content: '\\]'
                        },
                        {
                            type: 'text',
                            content: '}'
                        },
                        {
                            type: 'text',
                            content: '}'
                        },
                        {
                            type: 'text',
                            content: 'What this does:'
                        },
                        {
                            type: 'list',
                            items: [
                                'Watches for any WebSearch or WebFetch tool calls',
                            ]
                        },
                        {
                            type: 'list',
                            items: [
                                'Checks if the search query or URL contains \"2024\" or \"2025\"',
                            ]
                        },
                        {
                            type: 'list',
                            items: [
                                'If it does, blocks the call (exit code 1) and shows the message',
                            ]
                        },
                        {
                            type: 'list',
                            items: [
                                'Claude sees the message, corrects itself, and searches with \"2026\" instead',
                            ]
                        },
                        {
                            type: 'text',
                            content: 'You set this up once. From that point on, Claude never searches for\noutdated information again.'
                        },
                        {
                            type: 'heading',
                            content: 'Example 2: Skill Reminder'
                        },
                        {
                            type: 'text',
                            content: 'The problem: You created a writing skill in Module 6. It captures your\nvoice, tone, and style. But you keep forgetting to mention it when you\nask Claude to write something. Claude produces generic text, you remind\nit about the skill, it rewrites. Unnecessary back-and-forth.'
                        },
                        {
                            type: 'text',
                            content: 'The hook: When your prompt contains writing-related keywords, inject a\nreminder that the skill exists.'
                        },
                        {
                            type: 'text',
                            content: '{'
                        },
                        {
                            type: 'text',
                            content: '\"hooks\": {'
                        },
                        {
                            type: 'text',
                            content: '\"UserPromptSubmit\": \\['
                        },
                        {
                            type: 'text',
                            content: '{'
                        },
                        {
                            type: 'text',
                            content: '\"matcher\":\n\"write\\|draft\\|compose\\|email\\|post\\|article\\|message\",'
                        },
                        {
                            type: 'text',
                            content: '\"hook\": {'
                        },
                        {
                            type: 'text',
                            content: '\"type\": \"command\",'
                        },
                        {
                            type: 'text',
                            content: '\"command\": \"echo \'Reminder: the writing skill is available at\n.claude/skills/writing/. Use it to match the preferred voice and\nstyle.\'\"'
                        },
                        {
                            type: 'text',
                            content: '}'
                        },
                        {
                            type: 'text',
                            content: '}'
                        },
                        {
                            type: 'text',
                            content: '\\]'
                        },
                        {
                            type: 'text',
                            content: '}'
                        },
                        {
                            type: 'text',
                            content: '}'
                        },
                        {
                            type: 'text',
                            content: 'What this does:'
                        },
                        {
                            type: 'list',
                            items: [
                                'Watches every prompt you submit',
                            ]
                        },
                        {
                            type: 'list',
                            items: [
                                'If your prompt contains words like \"write,\" \"draft,\" \"email,\" or \"post,\" it fires',
                            ]
                        },
                        {
                            type: 'list',
                            items: [
                                'Injects a reminder into Claude\'s context: \"Hey, the writing skill exists\"',
                            ]
                        },
                        {
                            type: 'list',
                            items: [
                                'Claude picks it up and uses the skill without you having to mention it',
                            ]
                        },
                        {
                            type: 'text',
                            content: 'This is a gentle nudge, not a hard block. Claude sees the reminder and\ndecides whether to use the skill based on the actual task.'
                        },
                        {
                            type: 'heading',
                            content: 'Example 3: Auto-Checkpoint'
                        },
                        {
                            type: 'text',
                            content: 'The problem: Claude sometimes makes changes that break things. If you\nhaven\'t committed recently, you have no easy way to undo the damage.\nYou know you should commit more often, but in the flow of work, you\nforget.'
                        },
                        {
                            type: 'text',
                            content: 'The hook: Before Claude edits any file, automatically create a git\ncheckpoint.'
                        },
                        {
                            type: 'text',
                            content: '{'
                        },
                        {
                            type: 'text',
                            content: '\"hooks\": {'
                        },
                        {
                            type: 'text',
                            content: '\"PreToolUse\": \\['
                        },
                        {
                            type: 'text',
                            content: '{'
                        },
                        {
                            type: 'text',
                            content: '\"matcher\": \"Edit\\|Write\",'
                        },
                        {
                            type: 'text',
                            content: '\"hook\": {'
                        },
                        {
                            type: 'text',
                            content: '\"type\": \"command\",'
                        },
                        {
                            type: 'text',
                            content: '\"command\": \"git add -A && git commit -m \'auto-checkpoint before\nClaude edit\' \-allow-empty 2\\>/dev/null \\|\\| true\"'
                        },
                        {
                            type: 'text',
                            content: '}'
                        },
                        {
                            type: 'text',
                            content: '}'
                        },
                        {
                            type: 'text',
                            content: '\\]'
                        },
                        {
                            type: 'text',
                            content: '}'
                        },
                        {
                            type: 'text',
                            content: '}'
                        },
                        {
                            type: 'text',
                            content: 'What this does:'
                        },
                        {
                            type: 'list',
                            items: [
                                'Watches for any file edit or write operation',
                            ]
                        },
                        {
                            type: 'list',
                            items: [
                                'Before the edit happens, stages all current changes and creates a commit',
                            ]
                        },
                        {
                            type: 'list',
                            items: [
                                'The \-allow-empty flag means it won\'t fail if there\'s nothing new to commit',
                            ]
                        },
                        {
                            type: 'list',
                            items: [
                                'The \\|\\| true ensures the hook never blocks Claude, even if git has issues',
                            ]
                        },
                        {
                            type: 'text',
                            content: 'Now you always have a rollback point. If Claude makes a mess, you can\ngit log to find the last checkpoint and git checkout to restore it.'
                        },
                        {
                            type: 'heading',
                            content: 'Understanding the Hook Format'
                        },
                        {
                            type: 'text',
                            content: 'Let\'s break down the structure so you can create your own:'
                        },
                        {
                            type: 'text',
                            content: '{'
                        },
                        {
                            type: 'text',
                            content: '\"hooks\": {'
                        },
                        {
                            type: 'text',
                            content: '\"EVENT\\_NAME\": \\['
                        },
                        {
                            type: 'text',
                            content: '{'
                        },
                        {
                            type: 'text',
                            content: '\"matcher\": \"pattern to match\",'
                        },
                        {
                            type: 'text',
                            content: '\"hook\": {'
                        },
                        {
                            type: 'text',
                            content: '\"type\": \"command\",'
                        },
                        {
                            type: 'text',
                            content: '\"command\": \"shell command to run\"'
                        },
                        {
                            type: 'text',
                            content: '},'
                        },
                        {
                            type: 'text',
                            content: '\"message\": \"optional message shown to Claude\"'
                        },
                        {
                            type: 'text',
                            content: '}'
                        },
                        {
                            type: 'text',
                            content: '\\]'
                        },
                        {
                            type: 'text',
                            content: '}'
                        },
                        {
                            type: 'text',
                            content: '}'
                        },
                        {
                            type: 'text',
                            content: 'EVENT\\_NAME - one of the four events: PreToolUse, PostToolUse,\nUserPromptSubmit, Stop.'
                        },

                            type: 'text',
                            content: 'The task depends heavily on your current conversation. Sub-agents do\nnot have your full conversation history. If the task requires\nunderstanding a nuanced decision you just made three messages ago, it is\nbetter to keep it in your main context.'

                            type: 'text',
                            content: 'You need to iterate on the result. If you know you will go back and\nforth multiple times (\"no, I meant the other authentication module\"),\ndoing that with a sub-agent is slower than just doing it in your main\nsession.'

                            type: 'text',
                            content: 'The rule of thumb: if you can describe the task in one or two\nsentences and the output you expect is a summary or report, it is a good\ncandidate for a sub-agent. If you cannot, keep it in your main\nsession.'

                            content: 'Each of these fixes was a conversation. I\'d flag the issue, we\'d\ndiscuss the right approach, and Claude would rewrite. Some sections went\nthrough three or four revisions.'
                        },
                        {
                            type: 'heading',
                            content: 'The meta point'
                        },
                        {
                            type: 'text',
                            content: 'This course about using Claude Code was built using Claude Code. Every\ntechnique we teach in the course - skills, MCP servers, hooks, meeting\ntranscripts, parallel agents, iterative conversation - was used to\ncreate the course itself.'
                        },
                        {
                            type: 'text',
                            content: 'The total human effort was:'
                        },
                        {
                            type: 'text',
                            content: '- Direction. Deciding what to cover, what tone to use, who the\naudience is.'
                        },
                        {
                            type: 'text',
                            content: '- A few pointers. \"Use this meeting.\" \"Check that skill.\" The data\nwas already in the system - I just had to point Claude in the right\ndirection.'
                        },
                        {
                            type: 'text',
                            content: '- Quality control. Catching the mistakes that AI naturally makes - wrong assumptions, cliches, teaching the wrong approach.'
                        },
                        {
                            type: 'text',
                            content: '- Taste. Knowing when something sounds off, even if it\'s technically\ncorrect.'
                        },
                        {
                            type: 'text',
                            content: 'The heavy lifting - transcription, retrieval, parallel writing, bulk\nediting - was all Claude. But it could only do that because everything\nwas already connected in one system. The course wasn\'t a one-time\nproject. It was the natural output of a system built and maintained with\na few minutes of effort each day.'
                        },
                    ]
                },
            ]
        },
    ]
};

        class CourseState {
            constructor() {
                this.currentView = 'home';
                this.currentModule = null;
                this.currentLesson = null;
                this.progress = this.loadProgress();
            }

            loadProgress() {
                const stored = localStorage.getItem('courseProgress');
                return stored ? JSON.parse(stored) : { modules: {}, exercises: {} };
            }

            markModuleComplete(moduleId) {
                this.progress.modules[moduleId] = { completed: true };
                this.saveProgress();
            }

            saveProgress() {
                localStorage.setItem('courseProgress', JSON.stringify(this.progress));
            }
        }

        const state = new CourseState();

        function renderHome() {
            let html = '<div class="home-view"><h1 class="page-title">Learn to Build</h1>';
            html += '<p class="page-subtitle">Learn to build your personal AI workstation. 8 modules, go at your own pace.</p>';
            const completed = Object.keys(state.progress.modules).length;
            const total = courseData.modules.length;
            const percentage = (completed / total) * 100;
            html += '<div class="progress-section"><div class="progress-label">Your Progress</div>';
            html += `<div class="progress-bar"><div class="progress-fill" style="width: ${percentage}%"></div></div>`;
            html += `<div class="progress-text">${completed} / ${total} modules completed</div></div>`;
            html += '<div class="modules-grid">';
            courseData.modules.forEach(module => {
                const isCompleted = state.progress.modules[module.id];
                const completedClass = isCompleted ? 'completed' : '';
                html += `<div class="module-card ${completedClass}" onclick="navigateToModule('${module.id}')">`;
                html += `<div class="module-number">Module ${module.number}</div>`;
                html += `<h3 class="module-title">${escapeHtml(module.title)}</h3>`;
                html += `<p class="module-description">${escapeHtml(module.description)}</p>`;
                html += `<div class="module-lessons">${module.lessons.length} lessons</div></div>`;
            });
            html += '</div></div>';
            return html;
        }

        function renderModule(moduleId) {
            const module = courseData.modules.find(m => m.id === moduleId);
            if (!module) return '<p>Module not found</p>';
            let html = '<div class="home-view"><h1 class="page-title">' + escapeHtml(module.title) + '</h1><div class="modules-grid">';
            module.lessons.forEach((lesson, idx) => {
                html += `<div class="module-card" onclick="navigateToLesson('${moduleId}', '${lesson.id}')">`;
                html += `<div class="module-number">Lesson ${idx + 1}</div><h3 class="module-title">${escapeHtml(lesson.title)}</h3></div>`;
            });
            html += '</div></div>';
            return html;
        }

        function renderLesson(moduleId, lessonId) {
            const module = courseData.modules.find(m => m.id === moduleId);
            const lesson = module ? module.lessons.find(l => l.id === lessonId) : null;
            if (!lesson) return '<p>Lesson not found</p>';

            const moduleIndex = courseData.modules.findIndex(m => m.id === moduleId);
            const lessonIndex = module.lessons.findIndex(l => l.id === lessonId);
            const isFirst = moduleIndex === 0 && lessonIndex === 0;
            const isLast = moduleIndex === courseData.modules.length - 1 && lessonIndex === module.lessons.length - 1;

            function navButtons() {
                let btns = '<div class="lesson-nav-buttons">';
                if (!isFirst) {
                    btns += `<button class="btn btn-secondary" onclick="navigatePrevious('${moduleId}', '${lessonId}')">← Previous</button>`;
                } else {
                    btns += '<div></div>';
                }
                if (!isLast) {
                    btns += `<button class="btn btn-primary" onclick="navigateNext('${moduleId}', '${lessonId}')">Next →</button>`;
                } else {
                    btns += '<div></div>';
                }
                btns += '</div>';
                return btns;
            }

            function topNav() {
                let nav = '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;margin-bottom:8px;">';
                if (!isFirst) {
                    nav += `<a href="#" onclick="event.preventDefault();navigatePrevious('${moduleId}', '${lessonId}')" style="font-size:13px;color:#968F86;text-decoration:none;">← Previous</a>`;
                } else {
                    nav += '<div></div>';
                }
                if (!isLast) {
                    nav += `<a href="#" onclick="event.preventDefault();navigateNext('${moduleId}', '${lessonId}')" style="font-size:13px;color:#968F86;text-decoration:none;">Next →</a>`;
                } else {
                    nav += '<div></div>';
                }
                nav += '</div>';
                return nav;
            }

            let html = '<div class="lesson-view"><div class="lesson-nav"><div class="lesson-breadcrumb">' + escapeHtml(module.title) + ' / ' + escapeHtml(lesson.title) + '</div></div>';
            html += topNav();
            html += '<h1 class="lesson-title">' + escapeHtml(lesson.title) + '</h1><div class="lesson-content">';
            lesson.sections.forEach(section => {
                if (section.type === 'heading') html += '<h2>' + escapeHtml(section.content) + '</h2>';
                else if (section.type === 'text') html += '<p>' + escapeHtml(section.content) + '</p>';
                else if (section.type === 'list') {
                    html += '<ul>'; section.items.forEach(item => { html += '<li>' + escapeHtml(item) + '</li>'; });
                    html += '</ul>';
                }
                else if (section.type === 'code') html += '<pre><code>' + escapeHtml(section.content) + '</code></pre>';
            });
            html += '</div><div class="lesson-nav" style="margin-top: 40px;">';
            html += navButtons();
            html += '</div></div>';
            return html;
        }

        function updateSidebar(moduleId, lessonId) {
            let html = '';
            courseData.modules.forEach(module => {
                html += `<div class="sidebar-section"><div class="sidebar-section-title" onclick="navigateToModule('${module.id}')" style="cursor:pointer">${escapeHtml(module.title)}</div>`;
                module.lessons.forEach(lesson => {
                    const isActive = module.id === moduleId && lesson.id === lessonId ? 'active' : '';
                    html += `<div class="sidebar-item ${isActive}" onclick="navigateToLesson('${module.id}', '${lesson.id}')">${escapeHtml(lesson.title)}</div>`;
                });
                html += '</div>';
            });
            document.getElementById('sidebarContent').innerHTML = html;
        }

        function navigateHome() {
            state.currentView = 'home';
            state.currentModule = null;
            state.currentLesson = null;
            document.getElementById('viewContainer').innerHTML = renderHome();
            updateSidebar(null, null);
        }

        function navigateToModule(moduleId) {
            const module = courseData.modules.find(m => m.id === moduleId);
            if (module && module.lessons.length > 0) {
                navigateToLesson(moduleId, module.lessons[0].id);
            }
        }

        function navigateToLesson(moduleId, lessonId) {
            state.currentView = 'lesson';
            state.currentModule = moduleId;
            state.currentLesson = lessonId;
            updateSidebar(moduleId, lessonId);
            document.getElementById('viewContainer').innerHTML = renderLesson(moduleId, lessonId);
        }

        function navigateNext(moduleId, lessonId) {
            const module = courseData.modules.find(m => m.id === moduleId);
            const moduleIndex = courseData.modules.findIndex(m => m.id === moduleId);
            const lessonIndex = module.lessons.findIndex(l => l.id === lessonId);
            if (lessonIndex < module.lessons.length - 1) {
                navigateToLesson(moduleId, module.lessons[lessonIndex + 1].id);
            } else if (moduleIndex < courseData.modules.length - 1) {
                const nextModule = courseData.modules[moduleIndex + 1];
                state.markModuleComplete(moduleId);
                navigateToLesson(nextModule.id, nextModule.lessons[0].id);
            }
        }

        function navigatePrevious(moduleId, lessonId) {
            const module = courseData.modules.find(m => m.id === moduleId);
            const moduleIndex = courseData.modules.findIndex(m => m.id === moduleId);
            const lessonIndex = module.lessons.findIndex(l => l.id === lessonId);
            if (lessonIndex > 0) {
                navigateToLesson(moduleId, module.lessons[lessonIndex - 1].id);
            } else if (moduleIndex > 0) {
                const prevModule = courseData.modules[moduleIndex - 1];
                navigateToLesson(prevModule.id, prevModule.lessons[prevModule.lessons.length - 1].id);
            }
        }

        function escapeHtml(text) {
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        navigateHome();
    </script>
